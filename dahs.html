<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Quota IA</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background-color: var(--panel-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
        }
        h1 { text-align: center; margin-top: 0; font-size: 1.5rem; }
        .input-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 1.5rem;
        }
        label { color: var(--text-muted); margin-bottom: 0.5rem; font-size: 0.9rem; }
        input {
            padding: 0.75rem;
            border-radius: 6px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 1rem;
        }
        input:focus { outline: none; border-color: var(--accent); }
        .progress-container { margin-bottom: 1.5rem; }
        .progress-label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 0.3rem; }
        .progress-bar {
            width: 100%;
            height: 10px;
            background-color: #334155;
            border-radius: 5px;
            overflow: hidden;
        }
        .progress-fill { height: 100%; border-radius: 5px; transition: width 0.3s ease; }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .stat-box {
            background-color: #0f172a;
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
        }
        .stat-value { font-size: 1.5rem; font-weight: bold; margin-bottom: 0.25rem; }
        .stat-label { font-size: 0.8rem; color: var(--text-muted); }
        .status-badge {
            text-align: center; padding: 0.75rem; border-radius: 6px; font-weight: bold; margin-top: 1.5rem;
        }
        .time-info { text-align: center; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 1.5rem; }
    </style>
</head>
<body>

    <div class="card">
        <h1>📊 Gestionnaire de Quota IA</h1>
        
        <div class="time-info" id="time-info">Calcul du cycle en cours...</div>

        <div class="input-group">
            <label for="usage">Pourcentage de quota utilisé (%)</label>
            <input type="number" id="usage" placeholder="Ex: 32" step="0.1" min="0" max="100" oninput="calculate()">
        </div>

        <div class="progress-container">
            <div class="progress-label">
                <span>Temps écoulé (Idéal)</span>
                <span id="time-percent-text">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="time-bar" style="width: 0%; background-color: var(--accent);"></div>
            </div>
        </div>

        <div class="progress-container">
            <div class="progress-label">
                <span>Ton utilisation réelle</span>
                <span id="usage-percent-text">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="usage-bar" style="width: 0%; background-color: var(--success);"></div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-value" id="remaining-quota">--%</div>
                <div class="stat-label">Quota Restant</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="daily-allowance">--%</div>
                <div class="stat-label">Autorisé / Jour</div>
            </div>
        </div>

        <div class="status-badge" id="status-message" style="background-color: #334155; color: white;">
            En attente de saisie...
        </div>
    </div>

    <script>
        function getLastWednesday21() {
            const now = new Date();
            const d = new Date(now);
            const day = d.getDay(); // 0=Dim, 1=Lun, ..., 3=Mer
            
            // Calculer l'écart par rapport au mercredi précédent
            let diff = day - 3;
            if (diff < 0 || (diff === 0 && d.getHours() < 21)) {
                diff += 7;
            }
            
            d.setDate(d.getDate() - diff);
            d.setHours(21, 0, 0, 0);
            return d;
        }

        function updateTime() {
            const lastWed = getLastWednesday21();
            const nextWed = new Date(lastWed);
            nextWed.setDate(nextWed.getDate() + 7);
            
            const now = new Date();
            const totalMs = nextWed - lastWed;
            const elapsedMs = now - lastWed;
            
            const elapsedPercent = (elapsedMs / totalMs) * 100;
            const daysRemaining = (totalMs - elapsedMs) / (1000 * 60 * 60 * 24);

            document.getElementById('time-bar').style.width = elapsedPercent + '%';
            document.getElementById('time-percent-text').innerText = elapsedPercent.toFixed(1) + '%';
            
            document.getElementById('time-info').innerText = 
                "Cycle: Mer 21:00 → Mer 21:00 | " + daysRemaining.toFixed(1) + " jours restants";

            return { elapsedPercent, daysRemaining };
        }

        function calculate() {
            const timeData = updateTime();
            const usageInput = document.getElementById('usage').value;
            
            if (!usageInput || usageInput === "") return;
            
            const usage = parseFloat(usageInput);
            const elapsed = timeData.elapsedPercent;
            const daysLeft = timeData.daysRemaining;

            // Update usage bar
            const usageBar = document.getElementById('usage-bar');
            usageBar.style.width = usage + '%';
            document.getElementById('usage-percent-text').innerText = usage + '%';

            // Calculate remaining
            const remaining = 100 - usage;
            document.getElementById('remaining-quota').innerText = remaining.toFixed(1) + '%';
            
            // Calculate allowance per remaining day
            let daily = remaining / daysLeft;
            document.getElementById('daily-allowance').innerText = daily.toFixed(1) + '% / j';

            // Logic for status
            const statusBox = document.getElementById('status-message');
            const diff = elapsed - usage;

            if (diff >= 5) {
                usageBar.style.backgroundColor = 'var(--success)';
                statusBox.style.backgroundColor = 'rgba(34, 197, 94, 0.2)';
                statusBox.style.color = 'var(--success)';
                statusBox.innerText = `✅ Tu es large ! Tu as ${diff.toFixed(1)}% d'avance sur le temps.`;
            } else if (diff >= -5) {
                usageBar.style.backgroundColor = 'var(--warning)';
                statusBox.style.backgroundColor = 'rgba(245, 158, 11, 0.2)';
                statusBox.style.color = 'var(--warning)';
                statusBox.innerText = `⚠️ Rythme normal. Reste autour de ${daily.toFixed(1)}% par jour.`;
            } else {
                usageBar.style.backgroundColor = 'var(--danger)';
                statusBox.style.backgroundColor = 'rgba(239, 68, 68, 0.2)';
                statusBox.style.color = 'var(--danger)';
                statusBox.innerText = `🚨 Danger ! Tu consommes trop vite (retard de ${Math.abs(diff).toFixed(1)}%).`;
            }
        }

        // Init
        updateTime();
        setInterval(updateTime, 60000); // Update every minute
    </script>
</body>
</html>
